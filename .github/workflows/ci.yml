name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        env:
          MONGO_DB: mongodb://localhost:27017/subledger_test
          PORT: 8001
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES: 90d
          NODE_ENV: test
        run: npm test